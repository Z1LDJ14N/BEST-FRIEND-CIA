<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bestie Cia</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-dark: #ff85a2;
            --pink-light: #ffb7c5;
            --bg-gradient: linear-gradient(180deg, #fff0f3 0%, #ffc1cc 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animasi Bunga Sakura Berjatuhan */
        .sakura {
            position: fixed;
            top: -10%;
            background-color: #ffb7c5;
            border-radius: 100% 0 100% 0;
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 90%;
            text-align: center;
            padding: 50px 0;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.3);
            margin-bottom: 50px;
            border: 3px solid var(--pink-light);
            animation: bounceIn 1.5s ease;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 2.8rem;
            margin: 0;
            line-height: 1.2;
        }

        p.sub-title {
            color: #ff4081;
            font-weight: 600;
            margin-top: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Grid Foto Album */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            justify-items: center;
        }

        .photo-card {
            background: white;
            padding: 12px 12px 35px 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 260px;
            border-radius: 5px;
        }

        .photo-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 3px;
        }

        /* Rotasi random biar kayak album asli */
        .photo-card:nth-child(1) { transform: rotate(-3deg); }
        .photo-card:nth-child(2) { transform: rotate(4deg); }
        .photo-card:nth-child(3) { transform: rotate(-2deg); }
        .photo-card:nth-child(4) { transform: rotate(3deg); }

        .photo-card:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 5;
            box-shadow: 0 20px 45px rgba(255, 64, 129, 0.4);
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            font-weight: 600;
            color: #d81b60;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .photo-card { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CIA ADALAH BEST FRIEND TERBAIK SAYA</h1>
            <p class="sub-title">SEMOGA SELALU JADI BEST FRIEND YAH! ✨</p>
        </header>

        <div class="album-grid">
            <div class="photo-card">
                <img src="https://autoresbot.com/tmp_files/7572ebbd-8fc6-4b43-a4bd-11d62b2533e5.jpg" alt="Foto 1">
            </div>
            <div class="photo-card">
                <img src="https://autoresbot.com/tmp_files/592d2d16-a961-461e-a4f1-db429df8b879.jpg" alt="Foto 2">
            </div>
            <div class="photo-card">
                <img src="https://autoresbot.com/tmp_files/2d1e2a81-6d56-41bd-8b27-1492b208888e.jpg" alt="Foto 3">
            </div>
            <div class="photo-card">
                <img src="https://autoresbot.com/tmp_files/d9947d3c-9c78-43c8-ad65-239d6f0e8830.jpg" alt="Foto 4">
            </div>
        </div>

        <footer>
            Besties Forever! 🎀
        </footer>
    </div>

    <script>
        function createSakura() {
            const container = document.body;
            for (let i = 0; i < 25; i++) {
                const petal = document.createElement('div');
                petal.classList.add('sakura');
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 12 + 8 + 'px';
                petal.style.height = petal.style.width;
                petal.style.animationDuration = Math.random() * 4 + 5 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(petal);
            }
        }
        createSakura();
    </script>
</body>
</html>
